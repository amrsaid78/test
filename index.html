<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تجربة محفظة الأسهم</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        input { margin: 5px; padding: 8px; }
        button { padding: 8px 15px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 4px; }
        #auth-section, #main-app { border: 1px solid #ddd; padding: 20px; border-radius: 8px; max-width: 400px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="auth-section">
        <h3>تسجيل الدخول / إنشاء حساب</h3>
        <input type="email" id="userEmail" placeholder="البريد الإلكتروني"><br>
        <input type="password" id="userPass" placeholder="كلمة المرور"><br>
        <button onclick="handleSignUp()">إنشاء حساب</button>
        <button onclick="handleLogin()">دخول</button>
    </div>

    <div id="main-app" style="display:none;">
        <h3>مرحباً بك في محفظتك</h3>
        <input type="text" id="stockName" placeholder="اسم السهم">
        <input type="number" id="quantity" placeholder="الكمية">
        <input type="number" id="price" placeholder="السعر">
        <button onclick="saveToCloud()">حفظ في السحابة</button>
        <button onclick="logout()" style="background:#f44336;">خروج</button>
        <hr>
        <h4>أسهمك:</h4>
        <ul id="stocksList"></ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcv6pKofo8iBGY3EbMiXlmlsrdUj6qYQ8",
            authDomain: "test-d03ba.firebaseapp.com",
            projectId: "test-d03ba",
            storageBucket: "test-d03ba.firebasestorage.app",
            messagingSenderId: "633459459744",
            appId: "1:633459459744:web:139bd6e8818789799d2bc5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // وظيفة إنشاء الحساب
        window.handleSignUp = async () => {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                alert("تم إنشاء الحساب بنجاح!");
            } catch (e) { alert("خطأ: " + e.message); }
        };

        // وظيفة الدخول
        window.handleLogin = async () => {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert("خطأ: " + e.message); }
        };

        // تسجيل الخروج
        window.logout = () => signOut(auth);

        // مراقبة حالة المستخدم
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                loadStocks(user.uid);
            } else {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        // حفظ البيانات
        window.saveToCloud = async () => {
            const user = auth.currentUser;
            const stock = document.getElementById('stockName').value;
            const qty = document.getElementById('quantity').value;
            const price = document.getElementById('price').value;

            try {
                await addDoc(collection(db, "user_stocks"), {
                    uid: user.uid,
                    stock: stock,
                    quantity: Number(qty),
                    price: Number(price),
                    timestamp: new Date()
                });
                alert("تم الحفظ!");
                loadStocks(user.uid);
            } catch (e) { console.error(e); }
        };

        // جلب البيانات
        async function loadStocks(uid) {
            const q = query(collection(db, "user_stocks"), where("uid", "==", uid));
            const querySnapshot = await getDocs(q);
            const list = document.getElementById('stocksList');
            list.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const li = document.createElement('li');
                li.textContent = `${data.stock} - الكمية: ${data.quantity} - السعر: ${data.price}`;
                list.appendChild(li);
            });
        }
    </script>
</body>
</html>
