    const app = initializeApp(firebaseConfig);

    window.auth = getAuth(app); // جعلناها window لتعمل مع الأزرار

    // وظيفة إنشاء حساب
    window.handleSignUp = async function() {

        } catch (e) { alert("خطأ في الإنشاء: " + e.message); }
    };

    // وظيفة دخول
    window.handleLogin = async function() {
        const email = document.getElementById('userEmail').value;
        const pass = document.getElementById('userPass').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) { alert("خطأ في الدخول: " + e.message); }
    };

    // مراقبة حالة المستخدم (دخول/خروج)
    auth.onAuthStateChanged((user) => {
        const authDiv = document.getElementById('auth-section');
        const appDiv = document.getElementById('main-app');
        if (user) {
            authDiv.style.display = 'none';
            appDiv.style.display = 'block';
            loadUserPortfolio();
        } else {
            authDiv.style.display = 'block';
            appDiv.style.display = 'none';
        }
    });

    // وظيفة الحفظ (التعديل: ربط الخانات بالمتغيرات)
    window.saveToCloud = async function() {
        const user = auth.currentUser;
        if (!user) { alert("يرجى تسجيل الدخول"); return; }

        const name = document.getElementById('stockName').value;
        const qty = document.getElementById('quantity').value;
        const prc = document.getElementById('price').value;

        try {
            await addDoc(collection(db, "user_stocks"), {
                uid: user.uid,
                stock: name,
                quantity: Number(qty),
                price: Number(prc),
                timestamp: new Date()
            });
            alert("تم حفظ السهم بنجاح! ✅");
            loadUserPortfolio(); // تحديث القائمة فوراً
        } catch (e) { console.error(e); }
    };
